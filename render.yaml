services:
  - type: web
    name: invest-auto-news
    env: python
    runtime: python-3.13.7
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODELOS
        value: gemini-3.1-flash-lite-preview,gemini-2.5-flash-lite,gemini-2.5-flash,gemini-2.0-flash,gemini-2.0-flash-lite
      - key: GEMINI_IMAGE_MODELOS
        value: gemini-3.1-flash-lite-image,gemini-3.1-flash-image,gemini-2.5-flash-image,gemini-3.1-flash-lite-image-preview,gemini-3.1-flash-image-preview,gemini-3-pro-image,gemini-3-pro-image-preview
      - key: IMAGE_PROVIDER
        value: gemini
      - key: GOOGLE_ADSENSE_CLIENT
        value: ca-pub-3623062544438213
      - key: ADSENSE_AD_SLOT
        sync: false
      - key: ADSENSE_FLUID_SLOT
        value: "5920613886"
      - key: ADSENSE_FLUID_LAYOUT_KEY
        value: "-gp+18-5a-gr+1eg"
      - key: ADSENSE_FLUID2_SLOT
        value: "5003238179"
      - key: ADSENSE_FLUID2_LAYOUT_KEY
        value: "-fd-l+6i-lx+n1"
      - key: ADSENSE_IN_ARTICLE_SLOT
        value: "3294450543"
      - key: ADSENSE_SIDEBAR_SLOT
        value: "1019761130"
      - key: ADSENSE_AUTORELAXED_SLOT
        value: "2568646523"
      - key: AFFILIATE_BINANCE_URL
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: ARTICLE_IMAGES_DIR
        value: /var/data/article_images
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1