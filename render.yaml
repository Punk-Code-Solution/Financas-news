services:
  - type: web
    name: invest-auto-news
    env: python
    runtime: python-3.13.7
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_API_KEY_2
        sync: false
      - key: GOOGLE_API_KEY_3
        sync: false
      - key: ROBOT_MAX_PER_FEED
        value: "3"
      - key: ROBOT_MAX_ARTICLES
        value: "36"
      - key: GEMINI_MODELOS
        value: gemini-3.1-flash-lite-preview,gemini-3.1-flash-lite,gemini-3.5-flash-lite,gemini-2.5-flash-lite,gemini-2.5-flash,gemini-3-flash,gemini-3.5-flash
      - key: GEMINI_IMAGE_MODELOS
        value: imagen-4.0-fast-generate-001,imagen-4.0-generate-001,imagen-4.0-ultra-generate-001,gemini-3.1-flash-lite-image,gemini-3.1-flash-image,gemini-2.5-flash-image
      - key: IMAGE_PROVIDER
        value: gemini
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_IMAGE_MODELOS
        value: dall-e-2,gpt-image-2,gpt-image-1.5,gpt-image-1,gpt-image-1-mini,dall-e-3
      - key: OPENAI_IMAGE_MIN_INTERVAL
        value: "65"
      - key: GOOGLE_ADSENSE_CLIENT
        value: ca-pub-3623062544438213
      - key: ADSENSE_AD_SLOT
        sync: false
      - key: ADSENSE_FLUID_SLOT
        value: "5920613886"
      - key: ADSENSE_FLUID_LAYOUT_KEY
        value: "-gp+18-5a-gr+1eg"
      - key: ADSENSE_FLUID2_SLOT
        value: "5003238179"
      - key: ADSENSE_FLUID2_LAYOUT_KEY
        value: "-fd-l+6i-lx+n1"
      - key: ADSENSE_IN_ARTICLE_SLOT
        value: "3294450543"
      - key: ADSENSE_SIDEBAR_SLOT
        value: "1019761130"
      - key: ADSENSE_AUTORELAXED_SLOT
        value: "2568646523"
      - key: AFFILIATE_BINANCE_URL
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: ARTICLE_IMAGES_DIR
        value: /var/data/article_images
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1