services:
  - type: web
    name: invest-auto-news
    env: python
    runtime: python-3.13.7
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODELOS
        value: gemini-3.1-flash-lite-preview
      - key: GEMINI_IMAGE_MODELOS
        value: imagen-4.0-fast-generate-001,imagen-4.0-generate-001
      - key: IMAGE_PROVIDER
        value: gemini
      - key: GOOGLE_ADSENSE_CLIENT
        sync: false
      - key: ADSENSE_AD_SLOT
        sync: false
      - key: AFFILIATE_BINANCE_URL
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: ARTICLE_IMAGES_DIR
        value: /var/data/article_images
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1