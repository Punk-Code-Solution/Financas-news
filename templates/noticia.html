<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ noticia[1] }} - Finanças News</title>
    <link rel="icon" href="/static/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3623062544438213" crossorigin="anonymous"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
    <style>
        .ticker-wrapper { overflow: hidden; white-space: nowrap; background-color: #111827; color: #cbd5e1; font-size: 0.75rem; padding: 0.25rem 0; border-bottom: 1px solid #1e293b;}
        .ticker-content { display: inline-block; animation: ticker 30s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        .ticker-up { color: #4ade80; } .ticker-down { color: #f87171; }
        
        /* CORREÇÃO: Esconde o container de anúncio se estiver vazio para remover a parte branca no topo */
        .ad-top:empty, .ad-top:has(ins[data-ad-status="unfilled"]) { display: none !important; }
        .ad-top { max-height: 280px; overflow: hidden; transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-[#0f172a] text-gray-800 dark:text-slate-200 transition-colors duration-200 flex flex-col min-h-screen">

    <div class="ticker-wrapper">
        <div class="ticker-content" id="market-ticker"><span class="text-slate-500">Cotações em tempo real...</span></div>
    </div>

    <nav class="border-b border-gray-200 dark:border-slate-800 bg-white dark:bg-[#0f172a] transition-colors duration-200 pt-4 pb-4 sticky top-0 z-50">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-black tracking-tighter">
                <span class="text-blue-600 dark:text-[#4ade80]">FINANÇAS</span><span class="text-gray-900 dark:text-white">NEWS</span>
            </a>
            <div class="flex items-center gap-4">
                <a href="/" class="text-sm font-semibold text-gray-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-white flex items-center transition-colors">
                    &larr; <span class="ml-1">Voltar</span>
                </a>
                <button id="theme-toggle" class="p-2 rounded-lg text-gray-500 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors">
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 pt-4 pb-8 max-w-4xl flex-none w-full">
        <div class="ad-top text-center mb-6" id="top-ad-container">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-3623062544438213" data-ad-slot="1234567890" data-ad-format="auto"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <article class="bg-white dark:bg-[#1e293b] rounded-xl shadow-sm p-6 md:p-12 border border-gray-200 dark:border-slate-800 transition-colors">
            <div class="flex items-center space-x-3 mb-6">
                <span class="bg-blue-100 dark:bg-white text-blue-800 dark:text-blue-900 text-xs font-bold px-3 py-1 rounded-full uppercase">{{ noticia[5] }}</span>
            </div>

            <h1 class="text-3xl md:text-5xl font-black text-gray-900 dark:text-white mb-8 leading-tight">{{ noticia[1] }}</h1>

            <div class="prose prose-lg max-w-none text-gray-700 dark:text-slate-300">
                <div class="bg-gray-50 dark:bg-[#0f172a] p-6 md:p-8 rounded-xl border-l-4 border-blue-500 mb-10 shadow-sm transition-colors">
                    <h3 class="text-xs font-black text-gray-500 uppercase tracking-wider mb-3">Resumo Inteligente</h3>
                    <p class="text-xl font-medium text-gray-800 dark:text-slate-200 leading-relaxed">{{ noticia[2] }}</p>
                </div>
                <div class="mb-8 bg-white dark:bg-[#1e293b] border-l-4 border-green-500 p-6 md:p-8 rounded-lg shadow-sm">
                    <h2 class="text-sm font-black text-gray-500 uppercase tracking-wider mb-3 flex items-center">💡 Impacto no seu Bolso</h2>
                    <p class="text-lg text-gray-800 dark:text-slate-200 font-medium leading-relaxed">{{ noticia[3] }}</p>
                </div>
            </div>

            <div class="mt-12 pt-8 border-t border-gray-200 dark:border-slate-800 flex flex-col sm:flex-row justify-between items-center">
                <a href="{{ noticia[4] }}" target="_blank" class="bg-gray-900 dark:bg-[#4ade80] text-white dark:text-black px-6 py-3.5 rounded-md font-extrabold hover:bg-gray-800 dark:hover:bg-green-500 transition shadow-md">Ler matéria original &rarr;</a>
                <p class="text-sm text-gray-500 dark:text-slate-500 italic">Curadoria automatizada por Punk Code Solution</p>
            </div>
        </article>
    </main>

    <script>
        function setInitialThemeIcons() {
            const darkIcon = document.getElementById('theme-toggle-dark-icon');
            const lightIcon = document.getElementById('theme-toggle-light-icon');
            if (!darkIcon || !lightIcon) return;
            if (document.documentElement.classList.contains('dark')) {
                lightIcon.classList.remove('hidden'); darkIcon.classList.add('hidden');
            } else {
                darkIcon.classList.remove('hidden'); lightIcon.classList.add('hidden');
            }
        }

        async function fetchMarketData() {
            const tickerEl = document.getElementById('market-ticker');
            try {
                const res = await fetch('https://economia.awesomeapi.com.br/last/USD-BRL,BTC-BRL');
                const data = await res.json();
                tickerEl.innerHTML = `<span class="ticker-item">🇺🇸 USD: R$ ${parseFloat(data.USDBRL.bid).toFixed(2)}</span><span class="ticker-item">₿ BTC: R$ ${parseFloat(data.BTCBRL.bid).toLocaleString()}</span>`;
            } catch (e) { tickerEl.innerHTML = 'Carregando mercado...'; }
        }

        document.addEventListener('DOMContentLoaded', () => {
            setInitialThemeIcons();
            fetchMarketData();

            document.body.addEventListener('click', async (e) => {
                const themeBtn = e.target.closest('#theme-toggle');
                if (themeBtn) {
                    document.documentElement.classList.toggle('dark');
                    localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
                    setInitialThemeIcons();
                    return;
                }
                // Intercepta cliques para garantir que o scroll resete e a limpeza do SPA ocorra
                const link = e.target.closest('a');
                if (link && new URL(link.href).origin === window.location.origin && link.target !== '_blank') {
                    // Aqui você deve chamar sua função global de carregarPaginaSemPiscar que está no seu index.html
                    // window.scrollTo(0,0);
                }
            });
        });
    </script>
</body>
</html>
