{# Seletor de idioma — usa lang_urls do contexto i18n #}
<div class="flex items-center gap-1" role="navigation" aria-label="{{ t('lang_label') }}">
    {% for code in supported_langs %}
    <a href="{{ lang_urls[code] }}"
       hreflang="{{ code }}"
       class="px-2 py-1 rounded-md text-[11px] font-bold tracking-wide transition
       {% if lang == code %}bg-blue-600 dark:bg-[#4ade80] text-white dark:text-slate-900{% else %}text-gray-500 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-800{% endif %}"
       {% if lang == code %}aria-current="true"{% endif %}>
        {{ t('lang_' ~ code) }}
    </a>
    {% endfor %}
</div>
