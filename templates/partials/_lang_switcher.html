{# Seletor de idioma — usa lang_urls do contexto i18n #}
<div class="inline-flex items-center gap-0.5 sm:gap-1 shrink-0" role="navigation" aria-label="{{ t('lang_label') }}">
    {% for code in supported_langs %}
    <a href="{{ lang_urls[code] }}"
       hreflang="{{ code }}"
       class="inline-flex items-center justify-center min-h-9 min-w-9 px-1.5 sm:px-2 py-1 rounded-md text-[10px] sm:text-[11px] font-bold tracking-wide transition
       {% if lang == code %}bg-blue-600 dark:bg-[#4ade80] text-white dark:text-slate-900{% else %}text-gray-600 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-800{% endif %}"
       {% if lang == code %}aria-current="true"{% endif %}>
        {{ t('lang_' ~ code) }}
    </a>
    {% endfor %}
</div>
