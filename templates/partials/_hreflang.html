{# Canônica + hreflang: pt-BR/x-default = canonical_url (sem ?lang= divergente). #}
<link rel="canonical" href="{{ canonical_url }}">
<link rel="alternate" hreflang="pt-BR" href="{{ hreflang_urls['pt-BR'] }}">
{% if hreflang_full %}
<link rel="alternate" hreflang="en" href="{{ hreflang_urls['en'] }}">
<link rel="alternate" hreflang="ja" href="{{ hreflang_urls['ja'] }}">
{% endif %}
<link rel="alternate" hreflang="x-default" href="{{ hreflang_urls['x-default'] }}">
