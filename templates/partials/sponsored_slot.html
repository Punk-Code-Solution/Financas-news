{% if monetization.sponsored.enabled %}
<div class="my-8 rounded-xl border border-dashed border-amber-400/60 bg-amber-50/50 dark:bg-amber-900/10 p-6 relative">
    <span class="absolute top-3 right-3 text-[10px] font-bold uppercase tracking-wider text-amber-600 dark:text-amber-400 bg-amber-100 dark:bg-amber-900/40 px-2 py-0.5 rounded">{{ monetization.sponsored.label }}</span>
    <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">{{ monetization.sponsored.titulo }}</h3>
    <p class="text-sm text-gray-600 dark:text-slate-400 mb-4">{{ monetization.sponsored.descricao }}</p>
    <a href="{{ monetization.sponsored.url }}" target="_blank" rel="noopener sponsored"
       class="inline-flex items-center text-sm font-bold text-amber-700 dark:text-amber-300 hover:underline">
        {{ t('learn_more') }}
    </a>
</div>
{% endif %}
