{% if enrichment.historical_charts %}
<section class="mb-8" id="analise-graficos">
    <div class="mb-4">
        <p class="text-[10px] font-black uppercase tracking-widest text-blue-600 dark:text-[#4ade80]">Base gráfica da análise</p>
        <h3 class="text-base font-black text-gray-900 dark:text-white">Histórico que sustentou o raciocínio</h3>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        {% for chart in enrichment.historical_charts %}
        <div class="bg-white dark:bg-[#0f172a] border border-gray-200 dark:border-slate-700 rounded-xl p-4 shadow-sm">
            <p class="text-sm font-black text-gray-900 dark:text-white mb-1">{{ chart.label }}</p>
            {% if chart.fonte %}<p class="text-[10px] text-gray-500 dark:text-slate-500 mb-2">Fonte: {{ chart.fonte }}</p>{% endif %}
            <canvas id="hist-chart-{{ chart.id }}" height="140" aria-label="{{ chart.label }}"></canvas>
        </div>
        {% endfor %}
    </div>
</section>
{% endif %}
