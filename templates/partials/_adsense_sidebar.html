{# Lateral do portal — um único retângulo vertical #}
{% if monetization.adsense.enabled and monetization.adsense.sidebar_slot %}
<div class="ad-rail">
    <span class="ad-rail__label">Publicidade</span>
    <div class="ad-rail__box p-1">
        <ins class="adsbygoogle"
             style="display:block;width:100%;max-width:100%;"
             data-ad-client="{{ monetization.adsense.client }}"
             data-ad-slot="{{ monetization.adsense.sidebar_slot }}"
             data-ad-format="vertical"
             data-full-width-responsive="false"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
</div>
{% endif %}
